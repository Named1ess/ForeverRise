alias +Bhop "fps_max 64;LimitFps64;StartBhop"
alias -Bhop "RecoverFPS;LimitFpsCancel;StopBhop"

alias StartBhop "alias JumpFunction_Ticker BhopTicker1"
alias StopBhop "-_jump;alias JumpFunction_Ticker"

alias BhopTicker1 "+_jump;-_jump;alias JumpFunction_Ticker BhopTicker2"
alias BhopTicker2 "alias JumpFunction_Ticker BhopTicker3"
alias BhopTicker3 "alias JumpFunction_Ticker BhopTicker4"
alias BhopTicker4 "alias JumpFunction_Ticker BhopTicker5"
alias BhopTicker5 "+jump;-jump;alias JumpFunction_Ticker BhopTicker6"
alias BhopTicker6 "alias JumpFunction_Ticker BhopTicker7"
alias BhopTicker7 "alias JumpFunction_Ticker BhopTicker8"
alias BhopTicker8 "alias JumpFunction_Ticker BhopTicker1"